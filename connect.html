<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>Connect — AI Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111;
      --border: #222;
      --border-focus: #7c3aed;
      --text: #e5e5e5;
      --muted: #666;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --error-bg: #2a1515;
      --error-border: #4a2020;
      --error-text: #f87171;
      --success-bg: #0d2a1a;
      --success-text: #4ade80;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* Make the window draggable from anywhere except interactive elements */
      -webkit-app-region: drag;
      user-select: none;
    }

    input, button, a, label { -webkit-app-region: no-drag; user-select: text; }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(124,58,237,0.07);
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon { display: inline-flex; align-items: center; line-height: 0; }
    .logo-icon svg { width: 28px; height: 28px; display: block; }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: 0.02em; }

    /* ── Headings / text ── */
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .sub { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; }

    /* ── Platform sign-in block ── */
    .platform-section { display: flex; flex-direction: column; gap: 10px; }
    .platform-url-row { display: flex; gap: 8px; }
    .platform-url-input {
      flex: 1;
      background: #151515;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .platform-url-input:focus { border-color: var(--border-focus); }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 0;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Feedback messages ── */
    .msg {
      border-radius: 6px;
      font-size: 13px;
      padding: 9px 12px;
      margin-top: 16px;
      text-align: center;
      display: none;
    }
    .msg.error   { display: block; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .msg.success { display: block; background: var(--success-bg); color: var(--success-text); border: 1px solid #1a4a2a; }
    .msg.info    { display: block; background: #111f2e; color: #60a5fa; border: 1px solid #1a2f4a; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon" aria-hidden>
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="botBody" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6D28D9" />
              <stop offset="1" stop-color="#4C1D95" />
            </linearGradient>
          </defs>
          <!-- antenna -->
          <rect x="31" y="5" width="2" height="10" rx="1" fill="#a78bfa" />
          <circle cx="32" cy="4" r="3.5" fill="#c4b5fd" />
          <!-- ears -->
          <rect x="8" y="24" width="6" height="18" rx="2.5" fill="#4C1D95" />
          <rect x="50" y="24" width="6" height="18" rx="2.5" fill="#4C1D95" />
          <!-- head -->
          <rect x="13" y="14" width="38" height="38" rx="10" fill="url(#botBody)" />
          <!-- eyes -->
          <circle cx="25" cy="33" r="5" fill="#FFF6C9" />
          <circle cx="39" cy="33" r="5" fill="#FFF6C9" />
          <circle cx="25" cy="33" r="2.2" fill="#4C1D95" />
          <circle cx="39" cy="33" r="2.2" fill="#4C1D95" />
        </svg>
      </span>
      <span class="logo-text">AI Workspace</span>
    </div>

    <h1>Connect Your Workspace</h1>
    <p class="sub">Sign in with the platform to link your workspace.</p>

    <!-- ── Platform sign-in ── -->
    <div class="platform-section">
      <div class="platform-url-row">
        <input
          id="platformUrl"
          class="platform-url-input"
          type="url"
          placeholder="https://your-platform.com"
          spellcheck="false"
        />
      </div>
      <button id="signInBtn" class="btn btn-primary" type="button">
        Sign in with Platform
      </button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const connect = window.__AIIDE_CONNECT__;
    const signInBtn = document.getElementById('signInBtn');
    const platformInput = document.getElementById('platformUrl');
    const msg = document.getElementById('msg');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'msg ' + type;
    }

    function clearMsg() {
      msg.className = 'msg';
    }

    // Populate the platform URL from main-process config on load.
    connect.getConfig().then(({ platformUrl }) => {
      if (platformUrl && platformUrl !== 'https://platform.example.com') {
        platformInput.value = platformUrl;
      }
    });

    // ── Platform sign-in ──
    signInBtn.addEventListener('click', async () => {
      const platformUrl = platformInput.value.trim();
      if (!platformUrl) {
        showMsg('Enter the platform URL first.', 'error');
        return;
      }
      clearMsg();
      signInBtn.disabled = true;
      signInBtn.innerHTML = '<span class="spinner"></span> Opening browser…';

      await connect.openPlatformBrowser(platformUrl);

      signInBtn.disabled = false;
      signInBtn.textContent = 'Sign in with Platform';
      showMsg('Browser opened — sign in, then the app will connect automatically.', 'info');
    });

    // Allow Enter key on the platform URL input.
    platformInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') signInBtn.click();
    });
  </script>
</body>
</html>
